<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Marvel Watchlist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0E0F14;
  --surface:#13141B;
  --surface2:#1A1C26;
  --border:#22253A;
  --border2:#2E3250;
  --text:#EDE8DC;
  --text2:#9A95A8;
  --text3:#4A4760;
  --red:#C8324A;
  --red-glow:rgba(200,50,74,0.15);
  --gold:#D4952A;
  --gold-dim:rgba(212,149,42,0.12);
  --teal:#2A8B8B;
  --accent:#7B68EE;
}

html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-weight:300;
  min-height:100vh;
  line-height:1.5;
}

/* ── BACKGROUND TEXTURE ── */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 20% -10%, rgba(200,50,74,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 110%, rgba(123,104,238,0.05) 0%, transparent 60%);
  pointer-events:none;z-index:0;
}

.wrap{max-width:980px;margin:0 auto;padding:0 24px 100px;position:relative;z-index:1}

/* ── TOP BAR ── */
.top-bar{
  height:2px;
  background:linear-gradient(90deg, transparent 0%, var(--red) 30%, var(--gold) 60%, var(--accent) 100%);
}

/* ── HEADER ── */
.header{
  padding:48px 0 28px;
  border-bottom:1px solid var(--border);
  position:relative;
}
.eyebrow{
  font-family:'DM Sans',sans-serif;
  font-size:10px;font-weight:500;
  letter-spacing:6px;
  color:var(--red);
  text-transform:uppercase;
  margin-bottom:14px;
  opacity:0.9;
}
h1{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(42px,7vw,76px);
  font-weight:300;
  font-style:italic;
  letter-spacing:-2px;
  line-height:0.95;
  color:var(--text);
}
h1 strong{
  font-style:normal;
  font-weight:600;
  color:#fff;
}
.header-meta{
  display:flex;align-items:center;gap:20px;margin-top:16px;
}
.header-sub{
  font-size:12px;font-weight:400;
  letter-spacing:1px;color:var(--text2);
}
.save-pill{
  font-size:10px;font-weight:500;letter-spacing:2px;
  padding:3px 10px;border-radius:20px;
  border:1px solid transparent;
  transition:all 0.3s;
  color:transparent;border-color:transparent;
}
.save-pill.saving{color:var(--gold);border-color:rgba(212,149,42,0.3);background:var(--gold-dim)}
.save-pill.saved{color:#4CAF50;border-color:rgba(76,175,80,0.3);background:rgba(76,175,80,0.08)}

/* ── STATS ── */
.stats{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:12px;margin:28px 0 20px;
}
.stat{
  background:var(--surface);
  border:1px solid var(--border);
  padding:20px 16px;
  position:relative;overflow:hidden;
}
.stat::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--red),transparent);
}
.stat-val{
  font-family:'Bebas Neue',sans-serif;
  font-size:36px;letter-spacing:1px;
  color:#fff;line-height:1;
}
.stat-label{
  font-size:9px;font-weight:500;
  letter-spacing:3px;color:var(--text3);
  text-transform:uppercase;margin-top:6px;
}
.stat-sub{font-size:10px;color:var(--text3);margin-top:2px}

/* ── PROGRESS ── */
.prog-wrap{margin-bottom:28px}
.prog-track{
  background:var(--surface2);height:2px;
  border-radius:2px;overflow:hidden;
}
.prog-fill{
  height:100%;
  background:linear-gradient(90deg,var(--red),var(--gold),var(--accent));
  transition:width 0.5s cubic-bezier(.4,0,.2,1);
}
.prog-label{
  display:flex;justify-content:space-between;
  font-size:10px;color:var(--text3);
  letter-spacing:1px;margin-top:8px;
}

/* ── TABS ── */
.tabs{display:flex;gap:0;margin-bottom:24px;border-bottom:1px solid var(--border)}
.tab{
  background:none;border:none;cursor:pointer;
  padding:12px 24px;
  font-family:'DM Sans',sans-serif;
  font-size:11px;font-weight:500;
  letter-spacing:3px;text-transform:uppercase;
  color:var(--text3);
  border-bottom:2px solid transparent;
  transition:all 0.2s;margin-bottom:-1px;
}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--text);border-bottom-color:var(--red)}

/* ── FILTERS ── */
.filters{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.search-wrap{position:relative}
.search-wrap::before{
  content:'⌕';
  position:absolute;left:16px;top:50%;transform:translateY(-50%);
  font-size:18px;color:var(--text3);pointer-events:none;
}
.search{
  width:100%;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:4px;
  color:var(--text);
  padding:11px 16px 11px 44px;
  font-family:'DM Sans',sans-serif;
  font-size:14px;font-weight:300;
  letter-spacing:0.5px;
  outline:none;
  transition:border-color 0.2s;
}
.search:focus{border-color:var(--border2)}
.search::placeholder{color:var(--text3)}
.chips{display:flex;gap:4px;flex-wrap:wrap}
.chip{
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text3);
  padding:4px 12px;
  border-radius:3px;
  cursor:pointer;
  font-family:'DM Sans',sans-serif;
  font-size:10px;font-weight:500;
  letter-spacing:1.5px;text-transform:uppercase;
  transition:all 0.15s;
}
.chip:hover{color:var(--text2);border-color:var(--border2)}
.filter-count{
  font-size:10px;color:var(--text3);
  letter-spacing:1px;font-weight:400;
}

/* ── LIST ITEMS ── */
.list{display:flex;flex-direction:column;gap:3px}
.item{
  display:grid;
  grid-template-columns:32px 2px 1fr auto;
  gap:0 16px;
  align-items:center;
  padding:14px 18px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:4px;
  cursor:pointer;
  transition:all 0.15s;
  user-select:none;
  position:relative;overflow:hidden;
}
.item::after{
  content:'';
  position:absolute;inset:0;
  background:var(--red-glow);
  opacity:0;transition:opacity 0.2s;
  pointer-events:none;
}
.item:hover::after{opacity:1}
.item:hover{border-color:var(--border2)}
.item.watched{
  opacity:0.38;
  border-color:var(--border);
}
.item.watched:hover::after{opacity:0}

.checkbox{
  width:24px;height:24px;
  border:1.5px solid var(--border2);
  border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all 0.2s;
  font-size:13px;color:#fff;
}
.item.watched .checkbox{
  background:var(--red);border-color:var(--red);
  box-shadow:0 0 12px rgba(200,50,74,0.4);
}
.ubar{align-self:stretch;border-radius:2px;flex-shrink:0}

.item-title{
  font-family:'Cormorant Garamond',serif;
  font-size:17px;font-weight:400;
  color:var(--text);
  line-height:1.2;
  transition:color 0.15s;
}
.item.watched .item-title{
  color:var(--text3);
  text-decoration:line-through;
  text-decoration-color:var(--text3);
}
.item-title-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.tier-badge{
  font-size:8px;font-weight:500;
  letter-spacing:2px;
  font-family:'DM Sans',sans-serif;
  padding:2px 8px;border-radius:2px;
  text-transform:uppercase;
}
.phase-tag{
  font-size:9px;color:var(--text3);
  font-family:'DM Sans',sans-serif;
  letter-spacing:1px;
}
.item-meta{
  display:flex;gap:12px;margin-top:4px;
  font-size:10px;color:var(--text3);
  font-family:'DM Sans',sans-serif;letter-spacing:0.5px;
}
.item-uni{opacity:0.8}
.item-right{text-align:right;flex-shrink:0}
.item-runtime{font-size:11px;color:var(--text3);font-weight:400}
.item-where{font-size:9px;color:var(--text3);margin-top:3px;opacity:0.6}

/* ── UNIVERSE VIEW ── */
.uni-list{display:flex;flex-direction:column;gap:8px}
.uni-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:4px;padding:18px 22px;
  transition:border-color 0.2s;
}
.uni-card:hover{border-color:var(--border2)}
.uni-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.uni-left{display:flex;align-items:center;gap:12px}
.uni-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.uni-name{
  font-family:'Cormorant Garamond',serif;
  font-size:16px;font-weight:400;color:var(--text);
}
.uni-count{font-size:10px;color:var(--text3);margin-top:2px}
.uni-pct{
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;letter-spacing:1px;
}
.uni-track{background:var(--surface2);height:2px;border-radius:2px;overflow:hidden}
.uni-fill{height:100%;transition:width 0.5s cubic-bezier(.4,0,.2,1);border-radius:2px}

/* ── LEGEND ── */
.legend{
  margin-top:48px;border-top:1px solid var(--border);
  padding-top:28px;
  display:grid;grid-template-columns:repeat(2,1fr);gap:32px;
}
.legend-title{
  font-size:9px;font-weight:500;
  letter-spacing:4px;color:var(--text3);
  text-transform:uppercase;margin-bottom:14px;
}
.legend-row{
  display:flex;align-items:center;gap:10px;
  font-size:12px;color:var(--text2);
  margin-bottom:8px;
  font-family:'DM Sans',sans-serif;font-weight:300;
}
.ldot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

.footer{
  margin-top:40px;text-align:center;
  font-size:9px;color:var(--text3);
  letter-spacing:4px;text-transform:uppercase;
  font-family:'DM Sans',sans-serif;
}

.empty{
  text-align:center;color:var(--text3);
  padding:80px 20px;
  font-family:'Cormorant Garamond',serif;
  font-style:italic;font-size:18px;
}
</style>
</head>

  <div id="view-universe" style="display:none">

  <div class="legend">

    </div>
    <div>
      <div class="legend-title">Universes</div>
      <div id="legend-unis"></div>
    </div>
  </div>

  <div class="footer" id="footer"></div>
</div>

let W={},fU='All',fT='All',fTy='All',view='list',st=null;
function load(){try{W=JSON.parse(localStorage.getItem(SK))||{};}catch(_){W={};}}
function save(){
  const el=document.getElementById('save-pill');
  el.textContent='SAVING';el.className='save-pill saving';
  clearTimeout(st);
  st=setTimeout(()=>{
    try{localStorage.setItem(SK,JSON.stringify(W));}catch(_){}
    el.textContent='SAVED';el.className='save-pill saved';
    setTimeout(()=>{el.className='save-pill';el.textContent='';},2000);
  },300);
}
function toggle(id){W[id]=!W[id];save();render();}
function setU(u){fU=u;render();}
function setT(t){fT=t;render();}
function setTy(t){fTy=t;render();}
function switchView(v){
  view=v;
  document.getElementById('view-list').style.display=v==='list'?'':'none';
  document.getElementById('view-universe').style.display=v==='universe'?'':'none';
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',(i===0&&v==='list')||(i===1&&v==='universe')));
  render();
}
function esc(s){return s.replace(/'/g,"\\'");}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const filtered=[...DATA].sort((a,b)=>a.year-b.year).filter(m=>
    (fU==='All'||m.universe===fU)&&(fT==='All'||m.tier===fT)&&
    (fTy==='All'||m.type===fTy)&&(!q||m.title.toLowerCase().includes(q))
  );
  const tw=Object.values(W).filter(Boolean).length;
  const et=DATA.filter(m=>m.tier==='Essential').length;
  const ew=DATA.filter(m=>m.tier==='Essential'&&W[m.id]).length;
  const pct=Math.round(tw/DATA.length*100);
  document.getElementById('s-watched').textContent=tw;
  document.getElementById('s-watched-sub').textContent=`of ${DATA.length}`;
  document.getElementById('s-essential').textContent=ew;
  document.getElementById('s-essential-sub').textContent=`of ${et}`;
  document.getElementById('s-pct').textContent=pct+'%';
  document.getElementById('s-rem').textContent=DATA.length-tw;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-pct-label').textContent=pct+'%';
  document.getElementById('header-sub').textContent=`${DATA.length} titles · 17 universes · 1944 – 2026`;
  document.getElementById('footer').textContent=`${DATA.length} titles · progress saved to this browser`;

  // Universe chips
  document.getElementById('uni-chips').innerHTML=['All',...ERA].map(u=>{
    const col=UC[u]||'#C8324A';const a=fU===u;
    return `<button class="chip" onclick="setU('${esc(u)}')" style="${a?`background:${col}22;border-color:${col};color:${col};`:''}">
      ${u==='All'?'All Universes':(SH[u]||u)}</button>`;
  }).join('');

  // Tier chips
  document.getElementById('tier-chips').innerHTML=['All','Essential','Watch Once','Optional','Skip'].map(t=>{
    const c=TC[t];const a=fT===t;
    return `<button class="chip" onclick="setT('${t}')" style="${a&&c?`background:${c.bg};border-color:${c.color};color:${c.color};`:''}">
      ${t==='All'?'All Tiers':t==='Essential'?'🔴 Essential':t==='Watch Once'?'🟡 Watch Once':t==='Optional'?'🔵 Optional':'⚫ Skip'}</button>`;
  }).join('');

  // Type chips
  document.getElementById('type-chips').innerHTML=['All','Movie','Show','Special','Serial'].map(t=>{
    const a=fTy===t;
    return `<button class="chip" onclick="setTy('${t}')" style="${a?'background:rgba(255,255,255,0.06);border-color:#4A4760;color:#EDE8DC;':''}">
      ${t==='All'?'All Types':t}</button>`;
  }).join('');

  document.getElementById('filter-count').textContent=`Showing ${filtered.length} of ${DATA.length} titles`;

  if(view==='list'){
    document.getElementById('list').innerHTML=filtered.length===0
      ?'<div class="empty">Nothing matches your search.</div>'
      :filtered.map(m=>{
        const iw=!!W[m.id];
        const col=UC[m.universe]||'#555';
        const tc=TC[m.tier]||{color:'#555',bg:'transparent'};
        return `<div class="item${iw?' watched':''}" onclick="toggle(${m.id})">
          <div class="checkbox">${iw?'✓':''}</div>
          <div class="ubar" style="background:${col}"></div>
          <div>
            <div class="item-title-row">
              <span class="item-title">${m.title}</span>
              <span class="tier-badge" style="color:${tc.color};background:${tc.bg}">${m.tier}</span>
              ${m.phase?`<span class="phase-tag">${m.phase}</span>`:''}
            </div>
            <div class="item-meta">
              <span class="item-uni" style="color:${col}">${m.universe}</span>
              <span>${m.year}</span>
              <span>${m.type}</span>
            </div>
          </div>
          <div class="item-right">
            <div class="item-runtime">${m.runtime}</div>
            <div class="item-where">${m.where}</div>
          </div>
        </div>`;
      }).join('');
  }

  if(view==='universe'){
    const map={};
    DATA.forEach(m=>{
      if(!map[m.universe])map[m.universe]={total:0,w:0};
      map[m.universe].total++;if(W[m.id])map[m.universe].w++;
    });
    document.getElementById('uni-list').innerHTML=ERA.map(u=>{
      const d=map[u];if(!d)return'';
      const p=Math.round(d.w/d.total*100);
      const col=UC[u]||'#666';
      return `<div class="uni-card">
        <div class="uni-top">
          <div class="uni-left">
            <div class="uni-dot" style="background:${col}"></div>
            <div><div class="uni-name">${u}</div><div class="uni-count">${d.w} of ${d.total} titles</div></div>
          </div>
          <div class="uni-pct" style="color:${col}">${p}%</div>
        </div>
        <div class="uni-track"><div class="uni-fill" style="width:${p}%;background:${col}"></div></div>
      </div>`;
    }).join('');
  }

  document.getElementById('legend-unis').innerHTML=ERA.map(k=>
    `<div class="legend-row"><div class="ldot" style="background:${UC[k]}"></div>${k}</div>`
  ).join('');
}

load();render();
</script>
